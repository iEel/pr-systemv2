upstream it_pr_dms_next {
    server 127.0.0.1:3000;
    keepalive 32;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
}

limit_req_zone $binary_remote_addr zone=it_pr_login:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=it_pr_upload:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=it_pr_render:10m rate=20r/m;
limit_req_zone $binary_remote_addr zone=it_pr_app:10m rate=180r/m;
limit_conn_zone $binary_remote_addr zone=it_pr_conn:10m;

server {
    listen 80;
    server_name it-pr-dms.internal;

    client_max_body_size 25m;
    client_body_timeout 60s;
    keepalive_timeout 65s;

    access_log /var/log/nginx/it-pr-dms.access.log;
    error_log /var/log/nginx/it-pr-dms.error.log warn;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy same-origin always;
    add_header X-Frame-Options SAMEORIGIN always;

    location ^~ /api/auth/ {
        limit_req zone=it_pr_login burst=20 nodelay;
        limit_conn it_pr_conn 20;
        proxy_pass http://it_pr_dms_next;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location ~ ^/pr/[^/]+/(upload-quotation|upload-signed)$ {
        client_max_body_size 25m;
        limit_req zone=it_pr_upload burst=10 nodelay;
        limit_conn it_pr_conn 10;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
        proxy_pass http://it_pr_dms_next;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location ~ ^/(pr/[^/]+/(preview-pdf|pdf)|templates/[^/]+/preview)$ {
        limit_req zone=it_pr_render burst=10 nodelay;
        limit_conn it_pr_conn 10;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
        proxy_pass http://it_pr_dms_next;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location / {
        limit_req zone=it_pr_app burst=120 nodelay;
        limit_conn it_pr_conn 50;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_pass http://it_pr_dms_next;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
